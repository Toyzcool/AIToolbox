<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIToolbox</title>
  <style>
    /* Apple-inspired design system. Semantic colors mirror iOS / macOS system palette. */
    :root {
      color-scheme: light dark;

      --system-blue: #007AFF;
      --system-blue-pressed: #0066D6;

      --label: rgba(0, 0, 0, 0.88);
      --label-secondary: rgba(60, 60, 67, 0.68);
      --label-tertiary: rgba(60, 60, 67, 0.45);

      --bg: #F2F2F7;
      --surface: #FFFFFF;
      --separator: rgba(60, 60, 67, 0.12);
      --fill-tertiary: rgba(118, 118, 128, 0.12);
      --fill-quaternary: rgba(116, 116, 128, 0.08);

      --track: rgba(120, 120, 128, 0.24);
      --thumb-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.04), 0 3px 8px rgba(0, 0, 0, 0.15), 0 1px 1px rgba(0, 0, 0, 0.16);
      --active-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.04), 0 3px 8px rgba(0, 0, 0, 0.12), 0 1px 1px rgba(0, 0, 0, 0.04);

      /* Corner radii follow Apple's nested-corner convention: outer surfaces
         use bigger radii, children stay slightly smaller so their edges sit
         concentric to the parent card. */
      --radius-window: 16px;
      --radius-card: 16px;
      --radius-control: 12px;
      --radius-small: 10px;
      --radius-pill: 999px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --system-blue: #0A84FF;
        --system-blue-pressed: #409CFF;

        --label: rgba(255, 255, 255, 0.95);
        --label-secondary: rgba(235, 235, 245, 0.62);
        --label-tertiary: rgba(235, 235, 245, 0.32);

        --bg: #000000;
        --surface: #1C1C1E;
        --separator: rgba(84, 84, 88, 0.45);
        --fill-tertiary: rgba(118, 118, 128, 0.24);
        --fill-quaternary: rgba(118, 118, 128, 0.18);

        --track: rgba(120, 120, 128, 0.32);
        --active-shadow: none;
      }
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      width: 420px;
      margin: 0;
      padding: 18px 16px 14px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--label);
      letter-spacing: -0.01em;
      /* Rounds the inner popup surface so the content area mirrors the window
         chrome radius on macOS / iOS-style popovers. */
      border-radius: var(--radius-window);
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 4px 12px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .version {
      font-size: 11px;
      font-weight: 500;
      color: var(--label-secondary);
      background: var(--fill-tertiary);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }

    /* Site tabs — segmented control */
    .site-tabs {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 2px;
      padding: 2px;
      background: var(--fill-quaternary);
      border-radius: var(--radius-control);
      margin-bottom: 12px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--label);
      padding: 7px 0;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      border-radius: var(--radius-small);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease;
      letter-spacing: -0.01em;
    }

    .tab-btn:hover:not(.active) { background: var(--fill-tertiary); }
    .tab-btn:active { transform: scale(0.98); }

    .tab-btn.active {
      background: var(--surface);
      box-shadow: var(--active-shadow);
    }
    @media (prefers-color-scheme: dark) {
      .tab-btn.active { background: #636366; }
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .card[hidden] { display: none; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--label);
    }

    .value-display {
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--system-blue);
      letter-spacing: -0.01em;
    }

    /* Slider */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
      margin: 10px 0 4px;
      display: block;
    }

    input[type=range]:focus { outline: none; }

    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: var(--track);
      border-radius: var(--radius-pill);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      height: 22px;
      width: 22px;
      border-radius: 50%;
      background: #FFFFFF;
      margin-top: -9px;
      box-shadow: var(--thumb-shadow);
      transition: transform 0.12s ease;
    }

    input[type=range]:active::-webkit-slider-thumb {
      transform: scale(1.08);
    }

    /* Presets (segmented) */
    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 14px;
      padding: 2px;
      background: var(--fill-quaternary);
      border-radius: var(--radius-control);
    }

    .preset-btn {
      background: transparent;
      border: none;
      color: var(--label);
      padding: 6px 0;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      border-radius: var(--radius-small);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease;
      letter-spacing: -0.01em;
    }

    .preset-btn:hover:not(.active) { background: var(--fill-tertiary); }
    .preset-btn:active { transform: scale(0.97); }

    .preset-btn.active {
      background: var(--surface);
      box-shadow: var(--active-shadow);
    }
    @media (prefers-color-scheme: dark) {
      .preset-btn.active { background: #636366; }
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      width: 51px;
      height: 31px;
      background: var(--track);
      border-radius: var(--radius-pill);
      transition: background 0.25s ease;
      flex-shrink: 0;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 27px;
      height: 27px;
      background: #FFFFFF;
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15), 0 3px 1px rgba(0, 0, 0, 0.06);
    }

    input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    input[type="checkbox"]:checked + .toggle-switch {
      background: #34C759;
    }

    input[type="checkbox"]:checked + .toggle-switch::after {
      transform: translateX(20px);
    }

    /* Footer */
    .footer {
      margin-top: 6px;
      text-align: center;
      font-size: 11px;
      color: var(--label-tertiary);
    }

    /* Support link */
    .support-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .support-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--label);
    }

    .support-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #FFFFFF;
      background: var(--system-blue);
      border-radius: var(--radius-pill);
      text-decoration: none;
      transition: background 0.15s ease, transform 0.08s ease;
      letter-spacing: -0.01em;
    }

    .support-link:hover { background: var(--system-blue-pressed); }
    .support-link:active { transform: scale(0.97); }

    /* Export */
    .export-btn {
      width: 100%;
      padding: 11px 0;
      background: var(--system-blue);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-control);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease, opacity 0.15s ease;
    }
    .export-btn:hover:not(:disabled) { background: var(--system-blue-pressed); }
    .export-btn:active:not(:disabled) { transform: scale(0.98); }
    .export-btn:disabled { opacity: 0.45; cursor: default; }

    .export-btn.secondary {
      background: var(--fill-tertiary);
      color: var(--label);
      margin-top: 8px;
    }
    .export-btn.secondary:hover:not(:disabled) { background: var(--fill-quaternary); }
    @media (prefers-color-scheme: dark) {
      .export-btn.secondary:hover:not(:disabled) { background: rgba(118, 118, 128, 0.32); }
    }

    .export-status {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      color: var(--label-secondary);
      min-height: 14px;
    }
    .export-status.error { color: #FF3B30; }
    .export-status.success { color: #34C759; }

    /* Search box + results list — sized for the wider 420px popup, this is
       the primary interaction surface so it gets the most generous spacing. */
    .search-card {
      padding: 14px 16px;
    }
    .search-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      color: var(--label-tertiary);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 12px 40px 12px 38px;
      background: var(--fill-tertiary);
      border: none;
      border-radius: var(--radius-control);
      color: var(--label);
      font-family: inherit;
      font-size: 14px;
      letter-spacing: -0.01em;
      outline: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .search-input:focus {
      background: var(--surface);
      box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.25);
    }
    .search-input::placeholder { color: var(--label-tertiary); }
    .search-clear {
      position: absolute;
      right: 10px;
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: var(--label-tertiary);
      cursor: pointer;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease;
    }
    .search-clear:hover { background: var(--fill-tertiary); }
    .search-card[data-has-query="true"] .search-clear { display: flex; }

    .search-results {
      margin-top: 12px;
      max-height: 420px;
      overflow-y: auto;
      display: none;
      /* Scrollbar styling — keep it slim and on-brand. */
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 120, 128, 0.3) transparent;
    }
    .search-results::-webkit-scrollbar { width: 6px; }
    .search-results::-webkit-scrollbar-thumb {
      background: rgba(120, 120, 128, 0.28);
      border-radius: 3px;
    }
    .search-card[data-has-query="true"] .search-results { display: block; }

    .search-result {
      padding: 12px 14px;
      border-radius: var(--radius-control);
      cursor: pointer;
      transition: background 0.12s ease, transform 0.08s ease;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .search-result:hover { background: var(--fill-tertiary); }
    .search-result:active { transform: scale(0.99); }
    .search-result + .search-result {
      margin-top: 4px;
    }
    .search-result-main {
      flex: 1;
      min-width: 0;
    }
    .search-result-folder-btn {
      flex-shrink: 0;
      align-self: center;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--label-tertiary);
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: background 0.12s ease, color 0.12s ease, opacity 0.12s ease;
    }
    .search-result:hover .search-result-folder-btn,
    .search-result-folder-btn[data-assigned="true"] {
      opacity: 1;
    }
    .search-result-folder-btn:hover { background: var(--fill-quaternary); color: var(--label); }
    .search-result-folder-btn[data-assigned="true"] {
      color: var(--folder-color, var(--system-blue));
    }
    .search-result-folder-btn[data-assigned="true"]:hover {
      background: var(--fill-quaternary);
    }
    .search-result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      min-width: 0;
    }
    .search-result-site {
      flex-shrink: 0;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--system-blue);
      padding: 2px 8px;
      background: rgba(0, 122, 255, 0.12);
      border-radius: var(--radius-pill);
    }
    .search-result-title {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--label);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-result-snippet {
      font-size: 12px;
      color: var(--label-secondary);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .search-empty {
      padding: 28px 16px;
      text-align: center;
      font-size: 12.5px;
      color: var(--label-tertiary);
      line-height: 1.45;
    }

    /* Folder chip strip — sits between the search box and the results, lets
       users filter the result pool by topic-folder. Horizontal-scrolls when
       too many folders to fit. */
    .folder-strip {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      padding-bottom: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .folder-strip::-webkit-scrollbar { display: none; }

    .folder-chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--fill-tertiary);
      color: var(--label);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: -0.01em;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background 0.12s ease, transform 0.08s ease;
      white-space: nowrap;
    }
    .folder-chip:hover { background: var(--fill-quaternary); }
    .folder-chip:active { transform: scale(0.97); }

    .folder-chip[data-active="true"] {
      background: var(--label);
      color: var(--surface);
    }
    @media (prefers-color-scheme: dark) {
      .folder-chip[data-active="true"] {
        background: var(--surface);
        color: var(--label);
      }
    }

    .folder-chip-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .folder-chip-add {
      padding: 6px 8px;
      color: var(--label-secondary);
    }

    /* Create-folder inline dialog */
    .folder-create {
      margin-top: 10px;
      padding: 10px;
      background: var(--fill-quaternary);
      border-radius: var(--radius-control);
      display: none;
    }
    .folder-create[data-open="true"] { display: block; }

    .folder-create-input {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: none;
      border-radius: var(--radius-small);
      color: var(--label);
      font-family: inherit;
      font-size: 13px;
      letter-spacing: -0.01em;
      outline: none;
      transition: box-shadow 0.15s ease;
    }
    .folder-create-input:focus {
      box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.25);
    }

    .folder-create-colors {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .folder-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s ease, box-shadow 0.12s ease;
    }
    .folder-color-swatch:hover { transform: scale(1.1); }
    .folder-color-swatch[data-selected="true"] {
      box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--label);
    }

    .folder-create-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 10px;
    }
    .folder-create-btn {
      padding: 7px 14px;
      border: none;
      border-radius: var(--radius-small);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: opacity 0.12s ease, background 0.12s ease;
    }
    .folder-create-btn.primary {
      background: var(--system-blue);
      color: #FFFFFF;
    }
    .folder-create-btn.primary:hover { background: var(--system-blue-pressed); }
    .folder-create-btn.primary:disabled { opacity: 0.4; cursor: default; }
    .folder-create-btn.secondary {
      background: var(--fill-tertiary);
      color: var(--label);
    }
    .folder-create-btn.secondary:hover { background: var(--fill-quaternary); }

    /* Popover menus — used both for the per-result folder picker and the
       chip right-click menu. Single style, two purposes. */
    .aitb-popover {
      position: fixed;
      z-index: 100;
      min-width: 180px;
      max-width: 260px;
      padding: 4px;
      background: var(--surface);
      border-radius: var(--radius-control);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.06),
        0 8px 24px rgba(0, 0, 0, 0.18),
        0 2px 6px rgba(0, 0, 0, 0.06);
      font-size: 13px;
      letter-spacing: -0.01em;
      animation: aitb-pop-in 0.12s ease-out;
    }
    @keyframes aitb-pop-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .aitb-popover-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: var(--radius-small);
      color: var(--label);
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s ease;
    }
    .aitb-popover-item:hover { background: var(--fill-tertiary); }
    .aitb-popover-item[data-current="true"] {
      font-weight: 600;
    }
    .aitb-popover-item[data-current="true"]::after {
      content: '✓';
      margin-left: auto;
      color: var(--system-blue);
    }
    .aitb-popover-item.destructive { color: #FF3B30; }
    .aitb-popover-item.destructive:hover { background: rgba(255, 59, 48, 0.1); }
    .aitb-popover-separator {
      height: 0.5px;
      background: var(--separator);
      margin: 4px 0;
    }
    .aitb-popover-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .aitb-popover-colors {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
    }
    .aitb-popover-colors .folder-color-swatch {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AIToolbox</h1>
    <span class="version">3.2</span>
  </div>

  <div class="card search-card" id="searchCard" data-has-query="false">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="searchInput" class="search-input"
             placeholder="Search conversation history…" autocomplete="off">
      <button type="button" class="search-clear" id="searchClear" aria-label="Clear">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="folder-strip" id="folderStrip"></div>

    <div class="folder-create" id="folderCreate" data-open="false">
      <input type="text" id="folderCreateInput" class="folder-create-input"
             placeholder="Folder name…" maxlength="40" autocomplete="off">
      <div class="folder-create-colors" id="folderCreateColors"></div>
      <div class="folder-create-actions">
        <button type="button" class="folder-create-btn secondary" id="folderCreateCancel">Cancel</button>
        <button type="button" class="folder-create-btn primary" id="folderCreateConfirm" disabled>Create</button>
      </div>
    </div>

    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="site-tabs" role="tablist">
    <button class="tab-btn active" data-site="gemini" role="tab">Gemini</button>
    <button class="tab-btn" data-site="claude" role="tab">Claude</button>
    <button class="tab-btn" data-site="chatgpt" role="tab">ChatGPT</button>
  </div>

  <!-- Gemini panel -->
  <div class="card" data-panel="gemini">
    <div class="row">
      <span class="label-title">Chat Width</span>
      <span class="value-display" data-value="gemini">1200 px</span>
    </div>
    <input type="range" data-slider="gemini" min="800" max="2500" step="50" value="1200">
    <div class="presets" data-presets="gemini">
      <button class="preset-btn" data-width="1000">1000</button>
